# Crypto Radar — Render 部署配置
services:
  - type: worker
    name: crypto-radar
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
      - key: SCAN_INTERVAL
        value: 300
