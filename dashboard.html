<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crypto Radar 🚀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  padding: 16px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid rgba(212,168,67,0.2);
  margin-bottom: 20px;
}
.header h1 {
  font-size: 20px;
  color: #D4A843;
}
.header .badge {
  background: rgba(212,168,67,0.15);
  color: #D4A843;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: #1b1b1b;
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 10px;
  padding: 14px;
}
.stat-card .label { font-size: 11px; color: #888; }
.stat-card .value { font-size: 22px; font-weight: 700; color: #D4A843; margin-top: 4px; }
.section-title {
  font-size: 14px;
  color: #D4A843;
  margin: 16px 0 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.signal-card {
  background: #1b1b1b;
  border: 1px solid rgba(212,168,67,0.12);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.signal-card .coin {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.signal-card .tag {
  display: inline-block;
  background: rgba(0,200,83,0.15);
  color: #00c853;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}
.signal-card .detail {
  font-size: 13px;
  color: #aaa;
  margin-top: 6px;
  line-height: 1.6;
}
.signal-card .detail span { color: #D4A843; }
.footer {
  text-align: center;
  padding: 20px 0;
  font-size: 11px;
  color: #555;
  border-top: 1px solid rgba(212,168,67,0.1);
  margin-top: 20px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-dot.online { background: #00c853; box-shadow: 0 0 6px #00c853; }
.status-dot.offline { background: #ff5252; }
</style>
</head>
<body>
<div class="header">
  <h1>🚀 Crypto Radar</h1>
  <div class="badge">🔴 离线</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="label">监控币种</div>
    <div class="value" id="total-coins">-</div>
  </div>
  <div class="stat-card">
    <div class="label">今日信号</div>
    <div class="value" id="today-signals">-</div>
  </div>
</div>

<div class="section-title">🔥 费率转负 + OI 信号</div>
<div id="funding-signals">
  <div style="text-align:center;padding:40px 0;color:#555;">
    <div style="font-size:40px;margin-bottom:10px;">📡</div>
    等待首次扫描...
  </div>
</div>

<div class="section-title">📊 热度排行</div>
<div id="heat-list">
  <div style="text-align:center;padding:40px 0;color:#555;">
    <div style="font-size:40px;margin-bottom:10px;">⏳</div>
    正在加载...
  </div>
</div>

<div class="footer">
  Built by Coke · Powered by Binance API · 2026
</div>

<script>
// 从 API 获取数据
async function fetchData() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    updateUI(data);
  } catch(e) {
    console.log('API 不可用, 显示离线');
  }
}

function updateUI(data) {
  document.querySelector('.badge').textContent = '🟢 在线';
  document.getElementById('total-coins').textContent = data.total_coins || '-';
  document.getElementById('today-signals').textContent = data.today_signals || '0';
  
  // 费率信号
  const signalsEl = document.getElementById('funding-signals');
  if (data.signals && data.signals.length) {
    signalsEl.innerHTML = data.signals.map(s => `
      <div class="signal-card">
        <div>
          <span class="coin">${s.coin || s.symbol}</span>
          <span class="tag">OI ${s.oi_change > 0 ? '+' : ''}${s.oi_change?.toFixed(1)}%</span>
        </div>
        <div class="detail">
          价格: <span>$${s.price?.toFixed(4)}</span> · 
          24h: <span>${s.price_chg_24h > 0 ? '+' : ''}${s.price_chg_24h?.toFixed(1)}%</span><br>
          费率: <span>${(s.current_fr * 100)?.toFixed(4)}%</span> · 
          成交额: <span>$${(s.volume / 1e6)?.toFixed(1)}M</span>
        </div>
      </div>
    `).join('');
  } else {
    signalsEl.innerHTML = '<div style="text-align:center;padding:20px 0;color:#555;">暂无信号</div>';
  }
  
  // 热度排行
  const heatEl = document.getElementById('heat-list');
  if (data.heat_list && data.heat_list.length) {
    heatEl.innerHTML = data.heat_list.slice(0, 8).map((s, i) => `
      <div class="signal-card">
        <div>
          <span style="color:#D4A843;font-weight:700;">#${i+1}</span>
          <span class="coin">${s.coin}</span>
          <span class="tag">热度 ${s.heat_score?.toFixed(1)}</span>
        </div>
        <div class="detail">
          价格: <span>$${s.price?.toFixed(4)}</span> · 
          24h: <span>${s.price_chg_24h > 0 ? '+' : ''}${s.price_chg_24h?.toFixed(1)}%</span><br>
          OI: <span>${s.oi_change_1h > 0 ? '+' : ''}${s.oi_change_1h?.toFixed(1)}%</span> · 
          成交额: <span>$${(s.volume / 1e6)?.toFixed(1)}M</span>
        </div>
      </div>
    `).join('');
  } else {
    heatEl.innerHTML = '<div style="text-align:center;padding:20px 0;color:#555;">暂无数据</div>';
  }
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
